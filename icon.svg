<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2150"/>
      <stop offset="1" stop-color="#05071a"/>
    </linearGradient>
    <radialGradient id="face" cx="42%" cy="32%" r="75%">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#ffe9c9"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- sparkles -->
  <circle cx="96" cy="110" r="6" fill="#ffd21f"/>
  <circle cx="420" cy="150" r="7" fill="#ff6f91"/>
  <circle cx="120" cy="410" r="5" fill="#5cc4ff"/>

  <!-- bells -->
  <g fill="#2c4a8f" stroke="#16264f" stroke-width="8" stroke-linejoin="round">
    <path d="M150 150 q-44 -54 -8 -86 q40 -8 56 40 z"/>
    <path d="M362 150 q44 -54 8 -86 q-40 -8 -56 40 z"/>
  </g>
  <!-- legs -->
  <g fill="#16264f">
    <rect x="150" y="430" width="34" height="46" rx="14" transform="rotate(20 167 453)"/>
    <rect x="328" y="430" width="34" height="46" rx="14" transform="rotate(-20 345 453)"/>
  </g>

  <!-- clock body -->
  <circle cx="256" cy="276" r="166" fill="#2c4a8f"/>
  <circle cx="256" cy="276" r="150" fill="url(#face)" stroke="#ffce3a" stroke-width="6"/>
  <circle cx="256" cy="276" r="150" fill="none" stroke="#e7cfa0" stroke-width="6" opacity=".5"/>

  <!-- ticks -->
  <g fill="#b9a06a">
    <rect x="250" y="138" width="12" height="22" rx="5"/>
    <rect x="250" y="392" width="12" height="22" rx="5"/>
    <rect x="118" y="270" width="22" height="12" rx="5"/>
    <rect x="372" y="270" width="22" height="12" rx="5"/>
  </g>

  <!-- kawaii face -->
  <ellipse cx="212" cy="266" rx="13" ry="16" fill="#3a2b52"/>
  <ellipse cx="300" cy="266" rx="13" ry="16" fill="#3a2b52"/>
  <circle cx="208" cy="260" r="4.5" fill="#fff"/><circle cx="296" cy="260" r="4.5" fill="#fff"/>
  <ellipse cx="186" cy="292" rx="15" ry="9" fill="#ff7eb0" opacity=".6"/>
  <ellipse cx="326" cy="292" rx="15" ry="9" fill="#ff7eb0" opacity=".6"/>
  <path d="M238 296 q18 16 36 0" fill="none" stroke="#3a2b52" stroke-width="8" stroke-linecap="round"/>

  <!-- hands -->
  <line x1="256" y1="276" x2="256" y2="196" stroke="#1b2c70" stroke-width="13" stroke-linecap="round"/>
  <line x1="256" y1="276" x2="318" y2="312" stroke="#ffce3a" stroke-width="11" stroke-linecap="round"/>
  <circle cx="256" cy="276" r="13" fill="#3a2b52"/>
</svg>
